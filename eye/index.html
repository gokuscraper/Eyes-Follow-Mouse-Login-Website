<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>悟空爬虫 - 登录</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script>
    tailwind = window.tailwind || {};
    tailwind.config = {
      darkMode: ["class"],
      theme: {
        extend: {
          fontFamily: {
            body: ["Inter", "sans-serif"],
            headline: ["Inter", "sans-serif"],
          },
          colors: {
            background: "hsl(var(--background))",
            foreground: "hsl(var(--foreground))",
            card: {
              DEFAULT: "hsl(var(--card))",
              foreground: "hsl(var(--card-foreground))",
            },
            popover: {
              DEFAULT: "hsl(var(--popover))",
              foreground: "hsl(var(--popover-foreground))",
            },
            primary: {
              DEFAULT: "hsl(var(--primary))",
              foreground: "hsl(var(--primary-foreground))",
            },
            secondary: {
              DEFAULT: "hsl(var(--secondary))",
              foreground: "hsl(var(--secondary-foreground))",
            },
            muted: {
              DEFAULT: "hsl(var(--muted))",
              foreground: "hsl(var(--muted-foreground))",
            },
            accent: {
              DEFAULT: "hsl(var(--accent))",
              foreground: "hsl(var(--accent-foreground))",
            },
            destructive: {
              DEFAULT: "hsl(var(--destructive))",
              foreground: "hsl(var(--destructive-foreground))",
            },
            border: "hsl(var(--border))",
            input: "hsl(var(--input))",
            ring: "hsl(var(--ring))",
          },
          borderRadius: {
            lg: "var(--radius)",
            md: "calc(var(--radius) - 2px)",
            sm: "calc(var(--radius) - 4px)",
          },
          keyframes: {
            "accordion-down": {
              from: { height: "0" },
              to: { height: "var(--radix-accordion-content-height)" },
            },
            "accordion-up": {
              from: { height: "var(--radix-accordion-content-height)" },
              to: { height: "0" },
            },
            "fade-scale": {
              "0%": {
                opacity: "0",
                transform: "translateY(-50%) scale(0.95)",
              },
              "100%": {
                opacity: "1",
                transform: "translateY(-50%) scale(1)",
              },
            },
          },
          animation: {
            "accordion-down": "accordion-down 0.2s ease-out",
            "accordion-up": "accordion-up 0.2s ease-out",
            "fade-scale": "fade-scale 0.2s ease-out",
          },
        },
      },
    };
  </script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    :root {
      --background: 0 0% 100%;
      --foreground: 222.2 84% 4.9%;
      --card: 0 0% 100%;
      --card-foreground: 222.2 84% 4.9%;
      --popover: 0 0% 100%;
      --popover-foreground: 222.2 84% 4.9%;
      --primary: 231 48% 48%;
      --primary-foreground: 0 0% 98%;
      --secondary: 210 40% 96.1%;
      --secondary-foreground: 215.4 16.3% 46.9%;
      --muted: 210 40% 96.1%;
      --muted-foreground: 215.4 16.3% 46.9%;
      --accent: 210 40% 96.1%;
      --accent-foreground: 215.4 16.3% 46.9%;
      --destructive: 359 100% 65%;
      --destructive-foreground: 0 0% 98%;
      --border: 214.3 31.8% 91.4%;
      --input: 214.3 31.8% 91.4%;
      --ring: 231 48% 48%;
      --radius: 0.5rem;
    }

    * {
      box-sizing: border-box;
      border-color: hsl(var(--border));
    }

    html, body {
      height: 100%;
      overflow: hidden;
      background: hsl(var(--background));
      color: hsl(var(--foreground));
    }

    body {
      margin: 0;
      font-family: Inter, sans-serif;
    }

    .bg-grid-white-5 {
      background-image:
        linear-gradient(rgba(255, 255, 255, 0.05) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.05) 1px, transparent 1px);
      background-size: 20px 20px;
    }

    .eye-ball {
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 9999px;
      overflow: hidden;
      transition: all 150ms;
    }

    .character-transition {
      transition: all 700ms ease-in-out;
      transform-origin: bottom center;
    }

    .face-transition {
      transition: all 700ms ease-in-out;
    }

    .fast-face-transition {
      transition: all 200ms ease-out;
    }

    .pupil-transition {
      transition: transform 0.1s ease-out;
    }
  </style>
</head>
<body>
  <div class="min-h-screen max-h-screen overflow-hidden grid lg:grid-cols-2">
    <div class="relative hidden lg:flex flex-col justify-between bg-gradient-to-br from-gray-400 via-gray-500 to-gray-600 p-12 text-white">
      <div class="relative z-20">
        <a href="#" class="flex items-center gap-2 text-lg font-semibold">
          <img
            src="./logo.svg"
            alt="悟空爬虫 Logo"
            width="32"
            height="32"
            class="bg-white/10 backdrop-blur-sm p-1 rounded-lg"
          />
          <span>悟空爬虫</span>
        </a>
      </div>

      <div class="relative z-20 flex items-end justify-center h-[500px]">
        <div class="relative" id="characters-scene" style="width: 550px; height: 400px;">
          <div
            id="purple-character"
            class="absolute bottom-0 character-transition"
            style="left: 70px; width: 180px; height: 400px; background-color: #6C3FF5; border-radius: 10px 10px 0 0; z-index: 1;"
          >
            <div id="purple-eyes" class="absolute flex gap-8 face-transition" style="left: 45px; top: 40px;">
              <div id="purple-eye-1" class="eye-ball" style="width: 18px; height: 18px; background-color: white;">
                <div id="purple-pupil-1" class="rounded-full pupil-transition" style="width: 7px; height: 7px; background-color: #2D2D2D;"></div>
              </div>
              <div id="purple-eye-2" class="eye-ball" style="width: 18px; height: 18px; background-color: white;">
                <div id="purple-pupil-2" class="rounded-full pupil-transition" style="width: 7px; height: 7px; background-color: #2D2D2D;"></div>
              </div>
            </div>
          </div>

          <div
            id="black-character"
            class="absolute bottom-0 character-transition"
            style="left: 240px; width: 120px; height: 310px; background-color: #2D2D2D; border-radius: 8px 8px 0 0; z-index: 2;"
          >
            <div id="black-eyes" class="absolute flex gap-6 face-transition" style="left: 26px; top: 32px;">
              <div id="black-eye-1" class="eye-ball" style="width: 16px; height: 16px; background-color: white;">
                <div id="black-pupil-1" class="rounded-full pupil-transition" style="width: 6px; height: 6px; background-color: #2D2D2D;"></div>
              </div>
              <div id="black-eye-2" class="eye-ball" style="width: 16px; height: 16px; background-color: white;">
                <div id="black-pupil-2" class="rounded-full pupil-transition" style="width: 6px; height: 6px; background-color: #2D2D2D;"></div>
              </div>
            </div>
          </div>

          <div
            id="orange-character"
            class="absolute bottom-0 character-transition"
            style="left: 0; width: 240px; height: 200px; background-color: #FF9B6B; border-radius: 120px 120px 0 0; z-index: 3;"
          >
            <div id="orange-eyes" class="absolute flex gap-8 fast-face-transition" style="left: 82px; top: 90px;">
              <div id="orange-pupil-1" class="rounded-full pupil-transition" style="width: 12px; height: 12px; background-color: #2D2D2D;"></div>
              <div id="orange-pupil-2" class="rounded-full pupil-transition" style="width: 12px; height: 12px; background-color: #2D2D2D;"></div>
            </div>
          </div>

          <div
            id="yellow-character"
            class="absolute bottom-0 character-transition"
            style="left: 310px; width: 140px; height: 230px; background-color: #E8D754; border-radius: 70px 70px 0 0; z-index: 4;"
          >
            <div id="yellow-eyes" class="absolute flex gap-6 fast-face-transition" style="left: 52px; top: 40px;">
              <div id="yellow-pupil-1" class="rounded-full pupil-transition" style="width: 12px; height: 12px; background-color: #2D2D2D;"></div>
              <div id="yellow-pupil-2" class="rounded-full pupil-transition" style="width: 12px; height: 12px; background-color: #2D2D2D;"></div>
            </div>
            <div id="yellow-mouth" class="absolute w-20 h-[4px] bg-[#2D2D2D] rounded-full fast-face-transition" style="left: 40px; top: 88px;"></div>
          </div>
        </div>
      </div>

      <div class="relative z-20 flex items-center gap-8 text-sm text-gray-600">
        <a href="#" class="hover:text-gray-900 transition-colors">隐私政策</a>
        <a href="#" class="hover:text-gray-900 transition-colors">服务条款</a>
      </div>

      <div class="absolute inset-0 bg-grid-white-5"></div>
      <div class="absolute top-1/4 right-1/4 size-64 bg-gray-400/20 rounded-full blur-3xl"></div>
      <div class="absolute bottom-1/4 left-1/4 size-96 bg-gray-300/20 rounded-full blur-3xl"></div>
    </div>

    <div class="flex items-center justify-center p-8 bg-background">
      <div class="w-full max-w-[420px]">
        <div class="lg:hidden flex items-center justify-center gap-2 text-lg font-semibold mb-12">
          <img
            src="./logo.svg"
            alt="悟空爬虫 Logo"
            width="32"
            height="32"
          />
          <span>悟空爬虫</span>
        </div>

        <div class="text-center mb-10">
          <h1 class="text-3xl font-bold tracking-tight mb-2">欢迎回来！</h1>
          <p class="text-muted-foreground text-sm">请输入登录信息</p>
        </div>

        <form id="login-form" class="space-y-5">
          <div class="space-y-2">
            <label for="phone" class="text-sm font-medium">手机号</label>
            <input
              id="phone"
              type="tel"
              placeholder="请输入手机号"
              autocomplete="tel"
              class="flex h-12 w-full rounded-full border border-border/60 bg-background px-4 py-2 text-base ring-offset-background placeholder:text-muted-foreground focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-ring focus-visible:ring-offset-2 md:text-sm"
            />
            <p id="phone-error" class="hidden text-sm text-[#ff4d4f]"></p>
          </div>

          <div class="space-y-2">
            <label for="password" class="text-sm font-medium">密码</label>
            <div class="relative">
              <input
                id="password"
                type="password"
                placeholder="请输入密码"
                class="flex h-12 w-full rounded-full border border-border/60 bg-background px-4 py-2 pr-10 text-base ring-offset-background placeholder:text-muted-foreground focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-ring focus-visible:ring-offset-2 md:text-sm"
              />
              <button
                id="toggle-password"
                type="button"
                class="absolute right-3 top-1/2 -translate-y-1/2 text-muted-foreground hover:text-foreground transition-colors"
              >
                <svg id="eye-open-icon" class="size-5" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                  <path d="M2 12C3.8 8.5 7.4 6 12 6C16.6 6 20.2 8.5 22 12C20.2 15.5 16.6 18 12 18C7.4 18 3.8 15.5 2 12Z" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"></path>
                  <circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="1.8"></circle>
                </svg>
              </button>
            </div>
            <p id="password-error" class="hidden text-sm text-[#ff4d4f]"></p>
          </div>

          <div class="flex items-center justify-between">
            <label class="flex items-center space-x-2">
              <input id="remember" type="checkbox" class="h-4 w-4 rounded-sm border border-primary accent-[hsl(var(--primary))]" />
              <span class="text-sm font-normal cursor-pointer">30天内记住我</span>
            </label>
            <a id="forgot-password-link" href="#" class="text-sm text-[#1677ff] hover:text-[#4096ff] hover:underline font-medium">忘记密码？</a>
          </div>

          <div id="form-error" class="hidden p-3 text-sm text-[#d48806] bg-[#fffbe6] border border-[#ffe58f] rounded-lg"></div>

          <button
            id="login-button"
            type="submit"
            class="group relative w-full h-12 cursor-pointer overflow-hidden rounded-full border bg-background px-6 py-2 text-center font-semibold"
          >
            <span id="login-button-text" class="inline-block transition-all duration-300 group-hover:translate-x-12 group-hover:opacity-0">登录</span>
            <span class="absolute inset-0 z-10 flex items-center justify-center gap-2 bg-primary text-primary-foreground opacity-0 transition-all duration-300 group-hover:opacity-100 rounded-full">
              <span id="login-button-hover-text">登录</span>
              <svg class="h-4 w-4" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                <path d="M5 12H19" stroke="currentColor" stroke-width="2" stroke-linecap="round"></path>
                <path d="M12 5L19 12L12 19" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></path>
              </svg>
            </span>
          </button>
        </form>

        <div class="mt-6">
          <button
            id="google-button"
            type="button"
            class="group relative w-full h-12 cursor-pointer overflow-hidden rounded-full border border-border/60 bg-background px-6 py-2 text-center font-semibold"
          >
            <span class="inline-block transition-all duration-300 group-hover:translate-x-12 group-hover:opacity-0">使用微信登录</span>
            <span class="absolute inset-0 z-10 flex items-center justify-center gap-2 bg-primary text-primary-foreground opacity-0 transition-all duration-300 group-hover:opacity-100 rounded-full">
              <span>使用微信登录</span>
              <svg class="h-5 w-5" aria-hidden="true" focusable="false" xmlns="https://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none">
                <path d="M10 4C5.58 4 2 6.91 2 10.5C2 12.56 3.17 14.39 5 15.57V19L8.14 16.9C8.74 16.98 9.36 17.02 10 17.02C14.42 17.02 18 14.11 18 10.5C18 6.91 14.42 4 10 4Z" fill="currentColor"></path>
                <path d="M15.8 10.98C19.22 10.98 22 13.18 22 15.9C22 17.53 21 18.98 19.45 19.92V22L16.95 20.33C16.58 20.38 16.2 20.4 15.8 20.4C12.38 20.4 9.6 18.2 9.6 15.48C9.6 12.76 12.38 10.98 15.8 10.98Z" fill="currentColor" opacity="0.9"></path>
                <circle cx="7.2" cy="10.3" r="0.85" fill="currentColor" opacity="0.95"></circle>
                <circle cx="11.1" cy="10.3" r="0.85" fill="currentColor" opacity="0.95"></circle>
                <circle cx="14.35" cy="15.15" r="0.72" fill="currentColor" opacity="0.95"></circle>
                <circle cx="17.35" cy="15.15" r="0.72" fill="currentColor" opacity="0.95"></circle>
              </svg>
            </span>
          </button>
        </div>

        <div class="text-center text-sm text-muted-foreground mt-8">
          还没有账号？
          <a id="signup-link" href="#" class="text-[#1677ff] hover:text-[#4096ff] font-medium hover:underline">立即注册</a>
        </div>
      </div>
    </div>
  </div>

  <script>
    const state = {
      mouseX: 0,
      mouseY: 0,
      isTyping: false,
      showPassword: false,
      passwordLength: 0,
      isPurpleBlinking: false,
      isBlackBlinking: false,
      isLookingAtEachOther: false,
      isPurplePeeking: false,
      isLoading: false,
      error: "",
    };

    const refs = {
      phone: document.getElementById("phone"),
      password: document.getElementById("password"),
      phoneError: document.getElementById("phone-error"),
      passwordError: document.getElementById("password-error"),
      formError: document.getElementById("form-error"),
      togglePassword: document.getElementById("toggle-password"),
      eyeOpenIcon: document.getElementById("eye-open-icon"),
      loginForm: document.getElementById("login-form"),
      loginButtonText: document.getElementById("login-button-text"),
      loginButtonHoverText: document.getElementById("login-button-hover-text"),
      googleButton: document.getElementById("google-button"),
      forgotPasswordLink: document.getElementById("forgot-password-link"),
      signupLink: document.getElementById("signup-link"),
      purpleCharacter: document.getElementById("purple-character"),
      blackCharacter: document.getElementById("black-character"),
      orangeCharacter: document.getElementById("orange-character"),
      yellowCharacter: document.getElementById("yellow-character"),
      purpleEyes: document.getElementById("purple-eyes"),
      blackEyes: document.getElementById("black-eyes"),
      orangeEyes: document.getElementById("orange-eyes"),
      yellowEyes: document.getElementById("yellow-eyes"),
      yellowMouth: document.getElementById("yellow-mouth"),
      purpleEye1: document.getElementById("purple-eye-1"),
      purpleEye2: document.getElementById("purple-eye-2"),
      blackEye1: document.getElementById("black-eye-1"),
      blackEye2: document.getElementById("black-eye-2"),
      purplePupil1: document.getElementById("purple-pupil-1"),
      purplePupil2: document.getElementById("purple-pupil-2"),
      blackPupil1: document.getElementById("black-pupil-1"),
      blackPupil2: document.getElementById("black-pupil-2"),
      orangePupil1: document.getElementById("orange-pupil-1"),
      orangePupil2: document.getElementById("orange-pupil-2"),
      yellowPupil1: document.getElementById("yellow-pupil-1"),
      yellowPupil2: document.getElementById("yellow-pupil-2"),
    };

    function clamp(value, min, max) {
      return Math.max(min, Math.min(max, value));
    }

    function calculatePupilPosition(element, maxDistance, forceLookX, forceLookY) {
      if (!element) {
        return { x: 0, y: 0 };
      }

      if (forceLookX !== undefined && forceLookY !== undefined) {
        return { x: forceLookX, y: forceLookY };
      }

      const rect = element.getBoundingClientRect();
      const centerX = rect.left + rect.width / 2;
      const centerY = rect.top + rect.height / 2;
      const deltaX = state.mouseX - centerX;
      const deltaY = state.mouseY - centerY;
      const distance = Math.min(Math.sqrt(deltaX ** 2 + deltaY ** 2), maxDistance);
      const angle = Math.atan2(deltaY, deltaX);

      return {
        x: Math.cos(angle) * distance,
        y: Math.sin(angle) * distance,
      };
    }

    function calculatePosition(element) {
      if (!element) {
        return { faceX: 0, faceY: 0, bodySkew: 0 };
      }

      const rect = element.getBoundingClientRect();
      const centerX = rect.left + rect.width / 2;
      const centerY = rect.top + rect.height / 3;
      const deltaX = state.mouseX - centerX;
      const deltaY = state.mouseY - centerY;

      return {
        faceX: clamp(deltaX / 20, -15, 15),
        faceY: clamp(deltaY / 30, -10, 10),
        bodySkew: clamp(-deltaX / 120, -6, 6),
      };
    }

    function setElementTranslate(element, position) {
      element.style.transform = `translate(${position.x}px, ${position.y}px)`;
    }

    function updateEyeBall(eyeElement, pupilElement, options) {
      const { size, maxDistance, isBlinking, forceLookX, forceLookY } = options;
      eyeElement.style.width = `${size}px`;
      eyeElement.style.height = isBlinking ? "2px" : `${size}px`;
      pupilElement.style.display = isBlinking ? "none" : "block";

      if (!isBlinking) {
        const position = calculatePupilPosition(eyeElement, maxDistance, forceLookX, forceLookY);
        setElementTranslate(pupilElement, position);
      }
    }

    function updatePupil(element, options) {
      const { maxDistance, forceLookX, forceLookY } = options;
      const position = calculatePupilPosition(element, maxDistance, forceLookX, forceLookY);
      setElementTranslate(element, position);
    }

    function setFormError(message) {
      state.error = message;
      refs.formError.textContent = message;
      refs.formError.classList.toggle("hidden", !message);
    }

    function setFieldError(element, message) {
      element.textContent = message;
      element.classList.toggle("hidden", !message);
    }

    function validateForm() {
      const phone = refs.phone.value.trim();
      const password = refs.password.value;
      let valid = true;

      if (!/^1[3-9]\d{9}$/.test(phone)) {
        setFieldError(refs.phoneError, "请输入有效的11位手机号。");
        valid = false;
      } else {
        setFieldError(refs.phoneError, "");
      }

      if (password.length < 6) {
        setFieldError(refs.passwordError, "密码长度不能少于 6 位。");
        valid = false;
      } else {
        setFieldError(refs.passwordError, "");
      }

      return valid;
    }

    function updateLoadingState() {
      const label = state.isLoading ? "登录中..." : "登录";
      refs.loginButtonText.textContent = label;
      refs.loginButtonHoverText.textContent = label;
    }

    function updatePasswordIcon() {
      refs.eyeOpenIcon.innerHTML = state.showPassword
        ? '<path d="M3 3L21 21" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"></path><path d="M10.58 10.58A2 2 0 0013.42 13.42" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"></path><path d="M9.88 5.09A10.94 10.94 0 0112 4.9C16.6 4.9 20.2 7.4 22 10.9A17.2 17.2 0 0118.91 15.1" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"></path><path d="M6.1 6.1C4.38 7.3 3 8.93 2 10.9C3.8 14.4 7.4 16.9 12 16.9C13.27 16.9 14.48 16.71 15.6 16.36" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"></path>'
        : '<path d="M2 12C3.8 8.5 7.4 6 12 6C16.6 6 20.2 8.5 22 12C20.2 15.5 16.6 18 12 18C7.4 18 3.8 15.5 2 12Z" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"></path><circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="1.8"></circle>';
    }

    function renderCharacters() {
      const purplePos = calculatePosition(refs.purpleCharacter);
      const blackPos = calculatePosition(refs.blackCharacter);
      const yellowPos = calculatePosition(refs.yellowCharacter);
      const orangePos = calculatePosition(refs.orangeCharacter);
      const isHidingPassword = state.passwordLength > 0 && !state.showPassword;

      refs.purpleCharacter.style.height = (state.isTyping || isHidingPassword) ? "440px" : "400px";
      refs.purpleCharacter.style.transform = state.passwordLength > 0 && state.showPassword
        ? "skewX(0deg)"
        : (state.isTyping || isHidingPassword)
          ? `skewX(${(purplePos.bodySkew || 0) - 12}deg) translateX(40px)`
          : `skewX(${purplePos.bodySkew || 0}deg)`;

      refs.blackCharacter.style.transform = state.passwordLength > 0 && state.showPassword
        ? "skewX(0deg)"
        : state.isLookingAtEachOther
          ? `skewX(${(blackPos.bodySkew || 0) * 1.5 + 10}deg) translateX(20px)`
          : (state.isTyping || isHidingPassword)
            ? `skewX(${(blackPos.bodySkew || 0) * 1.5}deg)`
            : `skewX(${blackPos.bodySkew || 0}deg)`;

      refs.orangeCharacter.style.transform = state.passwordLength > 0 && state.showPassword
        ? "skewX(0deg)"
        : `skewX(${orangePos.bodySkew || 0}deg)`;

      refs.yellowCharacter.style.transform = state.passwordLength > 0 && state.showPassword
        ? "skewX(0deg)"
        : `skewX(${yellowPos.bodySkew || 0}deg)`;

      refs.purpleEyes.style.left = (state.passwordLength > 0 && state.showPassword) ? "20px" : state.isLookingAtEachOther ? "55px" : `${45 + purplePos.faceX}px`;
      refs.purpleEyes.style.top = (state.passwordLength > 0 && state.showPassword) ? "35px" : state.isLookingAtEachOther ? "65px" : `${40 + purplePos.faceY}px`;
      refs.blackEyes.style.left = (state.passwordLength > 0 && state.showPassword) ? "10px" : state.isLookingAtEachOther ? "32px" : `${26 + blackPos.faceX}px`;
      refs.blackEyes.style.top = (state.passwordLength > 0 && state.showPassword) ? "28px" : state.isLookingAtEachOther ? "12px" : `${32 + blackPos.faceY}px`;
      refs.orangeEyes.style.left = (state.passwordLength > 0 && state.showPassword) ? "50px" : `${82 + (orangePos.faceX || 0)}px`;
      refs.orangeEyes.style.top = (state.passwordLength > 0 && state.showPassword) ? "85px" : `${90 + (orangePos.faceY || 0)}px`;
      refs.yellowEyes.style.left = (state.passwordLength > 0 && state.showPassword) ? "20px" : `${52 + (yellowPos.faceX || 0)}px`;
      refs.yellowEyes.style.top = (state.passwordLength > 0 && state.showPassword) ? "35px" : `${40 + (yellowPos.faceY || 0)}px`;
      refs.yellowMouth.style.left = (state.passwordLength > 0 && state.showPassword) ? "10px" : `${40 + (yellowPos.faceX || 0)}px`;
      refs.yellowMouth.style.top = (state.passwordLength > 0 && state.showPassword) ? "88px" : `${88 + (yellowPos.faceY || 0)}px`;

      const purpleForceX = (state.passwordLength > 0 && state.showPassword) ? (state.isPurplePeeking ? 4 : -4) : state.isLookingAtEachOther ? 3 : undefined;
      const purpleForceY = (state.passwordLength > 0 && state.showPassword) ? (state.isPurplePeeking ? 5 : -4) : state.isLookingAtEachOther ? 4 : undefined;
      const blackForceX = (state.passwordLength > 0 && state.showPassword) ? -4 : state.isLookingAtEachOther ? 0 : undefined;
      const blackForceY = (state.passwordLength > 0 && state.showPassword) ? -4 : state.isLookingAtEachOther ? -4 : undefined;
      const frontForceX = (state.passwordLength > 0 && state.showPassword) ? -5 : undefined;
      const frontForceY = (state.passwordLength > 0 && state.showPassword) ? -4 : undefined;

      updateEyeBall(refs.purpleEye1, refs.purplePupil1, {
        size: 18,
        maxDistance: 5,
        isBlinking: state.isPurpleBlinking,
        forceLookX: purpleForceX,
        forceLookY: purpleForceY,
      });
      updateEyeBall(refs.purpleEye2, refs.purplePupil2, {
        size: 18,
        maxDistance: 5,
        isBlinking: state.isPurpleBlinking,
        forceLookX: purpleForceX,
        forceLookY: purpleForceY,
      });
      updateEyeBall(refs.blackEye1, refs.blackPupil1, {
        size: 16,
        maxDistance: 4,
        isBlinking: state.isBlackBlinking,
        forceLookX: blackForceX,
        forceLookY: blackForceY,
      });
      updateEyeBall(refs.blackEye2, refs.blackPupil2, {
        size: 16,
        maxDistance: 4,
        isBlinking: state.isBlackBlinking,
        forceLookX: blackForceX,
        forceLookY: blackForceY,
      });
      updatePupil(refs.orangePupil1, { maxDistance: 5, forceLookX: frontForceX, forceLookY: frontForceY });
      updatePupil(refs.orangePupil2, { maxDistance: 5, forceLookX: frontForceX, forceLookY: frontForceY });
      updatePupil(refs.yellowPupil1, { maxDistance: 5, forceLookX: frontForceX, forceLookY: frontForceY });
      updatePupil(refs.yellowPupil2, { maxDistance: 5, forceLookX: frontForceX, forceLookY: frontForceY });
    }

    function scheduleBlink(targetKey) {
      const getRandomBlinkInterval = () => Math.random() * 4000 + 3000;
      setTimeout(() => {
        state[targetKey] = true;
        renderCharacters();
        setTimeout(() => {
          state[targetKey] = false;
          renderCharacters();
          scheduleBlink(targetKey);
        }, 150);
      }, getRandomBlinkInterval());
    }

    let lookTimer = null;
    let peekTimer = null;
    let peekResetTimer = null;
    let feedbackTimer = null;

    function triggerLookingAtEachOther() {
      state.isLookingAtEachOther = true;
      renderCharacters();
      clearTimeout(lookTimer);
      lookTimer = setTimeout(() => {
        state.isLookingAtEachOther = false;
        renderCharacters();
      }, 800);
    }

    function schedulePeek() {
      clearTimeout(peekTimer);
      clearTimeout(peekResetTimer);

      if (state.passwordLength > 0 && state.showPassword) {
        peekTimer = setTimeout(() => {
          state.isPurplePeeking = true;
          renderCharacters();
          peekResetTimer = setTimeout(() => {
            state.isPurplePeeking = false;
            renderCharacters();
            schedulePeek();
          }, 800);
        }, Math.random() * 3000 + 2000);
      } else {
        state.isPurplePeeking = false;
        renderCharacters();
      }
    }

    window.addEventListener("mousemove", (event) => {
      state.mouseX = event.clientX;
      state.mouseY = event.clientY;
      renderCharacters();
    });

    refs.phone.addEventListener("focus", () => {
      state.isTyping = true;
      triggerLookingAtEachOther();
      renderCharacters();
    });

    refs.phone.addEventListener("blur", () => {
      state.isTyping = false;
      validateForm();
      renderCharacters();
    });

    refs.password.addEventListener("input", (event) => {
      state.passwordLength = event.target.value.length;
      schedulePeek();
      validateForm();
      renderCharacters();
    });

    refs.togglePassword.addEventListener("click", () => {
      state.showPassword = !state.showPassword;
      refs.password.type = state.showPassword ? "text" : "password";
      updatePasswordIcon();
      schedulePeek();
      renderCharacters();
    });

    refs.loginForm.addEventListener("submit", (event) => {
      event.preventDefault();
      if (!validateForm()) {
        setFormError("");
        return;
      }

      state.isLoading = true;
      updateLoadingState();
      setFormError("");

      clearTimeout(feedbackTimer);

      feedbackTimer = setTimeout(() => {
        state.isLoading = false;
        updateLoadingState();
        setFormError("登录电脑会爆炸，别登录了吧😁");
        feedbackTimer = null;
      }, 500);
    });

    refs.googleButton.addEventListener("click", () => {
      clearTimeout(feedbackTimer);
      state.isLoading = false;
      updateLoadingState();
      setFormError("登录微信会被盗，别登录了吧😒");
    });

    refs.forgotPasswordLink.addEventListener("click", (event) => {
      event.preventDefault();
      clearTimeout(feedbackTimer);
      state.isLoading = false;
      updateLoadingState();
      setFormError("重新注册一个吧，要不就找客服吧😲");
    });

    refs.signupLink.addEventListener("click", (event) => {
      event.preventDefault();
      clearTimeout(feedbackTimer);
      state.isLoading = false;
      updateLoadingState();
      setFormError("注册了就会被盗号，确定吗🧐");
    });

    state.mouseX = window.innerWidth / 2;
    state.mouseY = window.innerHeight / 2;
    updateLoadingState();
    updatePasswordIcon();
    scheduleBlink("isPurpleBlinking");
    scheduleBlink("isBlackBlinking");
    renderCharacters();
  </script>
</body>
</html>
